<style>
  details>summary {
    list-style: none;
  }

  details>summary::before {
    content: '▶';
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.2s;
  }

  details[open]>summary::before {
    transform: rotate(90deg);
  }
</style>

<!-- _includes/dropdown.html -->
<details>
  <summary style="display: block; border: 1px solid; background-color: #1e6bb8; color: #fff; padding: 8px 12px; margin-bottom: 4px; cursor: pointer;">
    {{ include.title }}
  </summary>
  <ul style="list-style: none; padding: 0; margin: 0;">
    {{ include.items }}
  </ul>
</details>
